name: Build unsigned IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate .xcodeproj
        run: xcodegen generate --spec project.yml

      - name: Archive
        run: |
          xcodebuild archive \
            -project HealthBridge.xcodeproj \
            -scheme HealthBridge \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$PWD/build/HealthBridge.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Embed icons in app bundle
        run: |
          APP=$(find build/HealthBridge.xcarchive/Products -name "*.app" | head -1)
          echo "App: $APP"

          # Create a simple green PNG icon using Python, write to /tmp first
          python3 -c "
import struct, zlib

def make_png(size, r, g, b):
    def chunk(name, data):
        c = zlib.crc32(name + data) & 0xffffffff
        return struct.pack('>I', len(data)) + name + data + struct.pack('>I', c)
    raw = b''.join(b'\x00' + bytes([r, g, b, 255] * size) for _ in range(size))
    ihdr = struct.pack('>IIBBBBB', size, size, 8, 2, 0, 0, 0)
    return b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR', ihdr) + chunk(b'IDAT', zlib.compress(raw)) + chunk(b'IEND', b'')

with open('/tmp/icon_src.png', 'wb') as f:
    f.write(make_png(1024, 52, 199, 89))
print('Source icon created')
"

          # Resize with sips and copy to .app
          sips -z 180 180 /tmp/icon_src.png --out "$APP/AppIcon60x60@3x.png"
          sips -z 120 120 /tmp/icon_src.png --out "$APP/AppIcon60x60@2x.png"
          sips -z 87  87  /tmp/icon_src.png --out "$APP/AppIcon29x29@3x.png"
          sips -z 58  58  /tmp/icon_src.png --out "$APP/AppIcon29x29@2x.png"
          sips -z 80  80  /tmp/icon_src.png --out "$APP/AppIcon40x40@2x.png"

          PLIST="$APP/Info.plist"
          /usr/libexec/PlistBuddy -c "Delete :CFBundleIcons" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons dict" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon dict" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles:0 string AppIcon60x60" "$PLIST"
          echo "Icons embedded successfully"

      - name: Package IPA
        run: |
          APP=$(find build/HealthBridge.xcarchive/Products -name "*.app" | head -1)
          rm -rf /tmp/Payload && mkdir -p /tmp/Payload/Payload
          cp -r "$APP" /tmp/Payload/Payload/
          cd /tmp/Payload && zip -r "$GITHUB_WORKSPACE/build/HealthBridge_unsigned.ipa" Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: HealthBridge_unsigned
          path: build/HealthBridge_unsigned.ipa
