name: HealthBridge

options:
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16"

targets:
  HealthBridge:
    type: application
    platform: iOS
    sources:
      - path: Sources
    resources:
      - path: Resources/Assets.xcassets
    entitlements:
      path: HealthBridge.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.user.healthbridge
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_IDENTITY: ""
        DEVELOPMENT_TEAM: ""
